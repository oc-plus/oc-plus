services:
  web:
    build:
      context: .docker/web
      args:
        PHP: ${PHP:-84}
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    restart: unless-stopped
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/app

      - ./.docker/log/apache:/var/log/apache2
      - ./.docker/log/php:/var/log/php
      - ./.docker/log/xdebug:/var/log/xdebug
    environment:
      TZ: Asia/Tbilisi
    depends_on:
      - mysql

  mail:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"

  mysql:
    image: mariadb:lts
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Import a data dump (if any) when initializing the container.
      - ./.docker/db-import:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_DATABASE: 'opencart'
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data:
